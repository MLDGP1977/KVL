<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVL - Dashboard de Produção Real-Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        * {
            min-width: 0;
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            /* No mobile permitimos scroll, no desktop travamos para o Fullscreen */
            height: 100%;
            overflow-x: hidden;
        }

        @media (min-width: 1024px) {
            body {
                height: 100vh;
                overflow: hidden;
            }
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100%;
        }

        @media (min-width: 1024px) {
            .app-container {
                height: 100vh;
            }
        }

        .card-premium {
            background: linear-gradient(145deg, #ffffff, #f8fafc);
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            position: relative;
            overflow: hidden;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #64748b;
            display: flex;
            align-items: center;
            margin-bottom: auto;
            align-self: flex-start;
            gap: 6px;
        }

        .stat-value {
            font-size: clamp(1.5rem, 5vh, 2.6rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            color: #0f172a;
            text-align: center;
            margin-top: auto;
            margin-bottom: auto;
        }

        .card-accent {
            position: absolute;
            left: 0;
            top: 10%;
            bottom: 10%;
            width: 4px;
            border-radius: 0 4px 4px 0;
        }


        .stat-subtext {
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 4px;
            text-align: center;
            padding: 4px 8px;
            border-radius: 999px;
            background: #f1f5f9;
            color: #64748b;
            transition: all 0.3s ease;
        }

        .stat-value.updated {
            transform: scale(1.08);
            color: #2563eb;
        }


        .chart-container-bg {
            background: #ffffff;
            border-radius: 20px;
            padding: 1.15rem;
            border: 1px solid #e2e8f0;
            height: 100%;
            display: flex;
            flex-direction: column;
            /*   min-height: 300px; /* Garante altura mínima no mobile */
        }

        @media (min-width: 1024px) {
            .chart-container-bg {
                min-height: 0;
                /* No desktop volta a ser flexível */
            }
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .pulse-status {
            animation: pulse-status 2s infinite;
        }

        @keyframes pulse-status {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.6;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .op-icon-container {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: #f1f5f9;
            color: #3b82f6;
            font-size: 1.6rem;
            border: 1px solid #e2e8f0;
        }

        .bar-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: white;
            white-space: nowrap;
        }


        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden">

            <!-- Gráficos Principais -->
            <div class="col-span-1 lg:col-span-4 lg:row-span-1 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <div class="col-span-1 lg:col-span-4 lg:row-span-5 grid grid-cols-1 md:grid-cols-2 gap-1">
                    <div class="chart-container-bg">
                        <h3
                            class="font-black text-slate-400 uppercase text-[12px] mb-2 tracking-widest flex items-center gap-2">

                            <!-- DIREITA -->
                            <div class="ml-auto flex items-center gap-3 text-[8px] font-bold">

                </div>
            </div>

            <!-- Barra Inferior -->
            <div class="col-span-1 lg:col-span-4 mt-2">
                <div class="w-full flex flex-col gap-1">
                    <div class="chart-container-bg flex flex-col items-center justify-around py-4 relative w-full">

                        <div class="absolute top-0 left-0 w-full h-1.5 bg-slate-50">
                            <div id="progress-line" class="h-full bg-blue-600 transition-all duration-1000"
                                style="width: 0%"></div>
                        </div>

                        <div class="w-full p-3 bg-slate-50 rounded-xl border-l-4 border-blue-600 grid grid-cols-2 items-center mt-2 relative">
    
    <div class="flex flex-col pr-6">
        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest block">
            Operação Atual
        </span>
        <span id="current-op-footer" class="text-sm font-black text-slate-800 uppercase">

        </span>
    </div>

    <div class="absolute left-1/2 top-1/4 bottom-1/4 w-px bg-slate-300"></div>

    <div class="flex justify-between items-center pl-6">

                ---
            </span>
        </div>

        <div id="op-indicators" class="flex gap-1 bg-white p-2 rounded-lg shadow-sm border border-slate-100">
            </div>
    </div>

</div>
                    </div>
                </div>
            </div>

        </main>



        <script>
            Chart.register(ChartDataLabels);

            Chart.defaults.font.family = "'Plus Jakarta Sans', sans-serif";
            Chart.defaults.font.size = 12;
            Chart.defaults.color = '#94a3b8';

            const normalizePercent = (v) => {
                let val = parseFloat(v);

                if (isNaN(val)) return 0;

                // se for decimal (0.85, 1.21, 2.35 vindo como proporção)
                if (val <= 10) {
                    val = val * 100;
                }

                return val;
            };

            // URL da API
            const API_URL = 'https://script.google.com/macros/s/AKfycbwVXmll05QQOMqjcM6gVJZrtG8ctsVDXAh_l85eqQXqdkkSkuqzbeyDo7PTge8EN9Difw/exec';

            const OPERATIONS = [
                { id: 'RtAcabamentoBarra', label: 'Acabamento: Barra', icon: 'fa-bacon', color: '#3b82f6' },
                { id: 'RtAcabamentoCaseado', label: 'Acabamento: Caseado', icon: 'fa-bacon', color: '#3b82f6' },
                { id: 'RtAcabamentoCosturaPonta', label: 'Acabamento: Costura Ponta', icon: 'fa-bacon', color: '#3b82f6' },
                { id: 'RtAcabamentoEtiquetaCos', label: 'Acabamento: Etiqueta Cós', icon: 'fa-bacon', color: '#3b82f6' },
                { id: 'RtAcabamentoPassante', label: 'Acabamento: Passante', icon: 'fa-bacon', color: '#3b82f6' },
                { id: 'RtAcabamentoPonta', label: 'Acabamento: Ponta', icon: 'fa-bacon', color: '#3b82f6' },
                { id: 'RtAcabamentoRebEntrePernas', label: 'Acabamento: Reb Entre Perna', icon: 'fa-bacon', color: '#3b82f6' },
                { id: 'RtAcabamentoRevisaoFinal', label: 'Acabamento: Revisão Final', icon: 'fa-bacon', color: '#3b82f6' },
                { id: 'RtAcabamentoTravet', label: 'Acabamento: Travet', icon: 'fa-bacon', color: '#3b82f6' },
                { id: 'RTDianteira2Lado', label: 'Dianteira: 2°Lado', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraBcBolso', label: 'Dianteira: Boca Bolso', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraBRelog', label: 'Dianteira: Bolso Relogio', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraCaseado', label: 'Dianteira: Caseado', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraVista', label: 'Dianteira: Conj. Vista', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraCurva', label: 'Dianteira: Curva', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraEspelho', label: 'Dianteira: Espelho', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraFPerna', label: 'Dianteira: Fechar entre Perna', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraFEspelho', label: 'Dianteira: Fechar Espelho', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraFForro', label: 'Dianteira: Fechar Forro', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraFixado', label: 'Dianteira: Fixado', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraFixadoL', label: 'Dianteira: Fixado Lateral', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraFBoca', label: 'Dianteira: Forro Boca', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraGanchinho', label: 'Dianteira: Ganchinho', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraMPonta', label: 'Dianteira: Marcação Ponta', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraPonta', label: 'Dianteira: Ponta', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraRevel', label: 'Dianteira: Revel Boca', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTDianteiraSand', label: 'Dianteira: Sanduíche', icon: 'fa-clone', color: '#10b981' },
                { id: 'RTMontAcop', label: 'Montagem: Acoplamento', icon: 'fa-object-group', color: '#f59e0b' },
                { id: 'RTMontBarra', label: 'Montagem: Barra', icon: 'fa-object-group', color: '#f59e0b' },
                { id: 'RTMontBolso', label: 'Montagem: Boca Bolso', icon: 'fa-object-group', color: '#f59e0b' },
                { id: 'RTMontCos', label: 'Montagem: Cós', icon: 'fa-object-group', color: '#f59e0b' },
                { id: 'RTMontPerna', label: 'Montagem: Fechar entre Perna', icon: 'fa-object-group', color: '#f59e0b' },
                { id: 'RTMontLateral', label: 'Montagem: Fechar Lateral', icon: 'fa-object-group', color: '#f59e0b' },
                { id: 'RTMontPonta', label: 'Montagem: Marcação Ponta', icon: 'fa-object-group', color: '#f59e0b' },
                { id: 'RTMontReb', label: 'Montagem: Reb. Entre Perna', icon: 'fa-object-group', color: '#f59e0b' },
                { id: 'RTMontGancho', label: 'Montagem: Rebater Gancho', icon: 'fa-object-group', color: '#f59e0b' },
                { id: 'RTMontRLateral', label: 'Montagem: Rebater lateral', icon: 'fa-object-group', color: '#f59e0b' },
                { id: 'RTMontTravet', label: 'Montagem: Travet', icon: 'fa-object-group', color: '#f59e0b' },
                { id: 'RTPrepBRelogio', label: 'Preparação: Bainha BRelogio', icon: 'fa-uncharted', color: '#ef4444' },
                { id: 'RTPrepBTraseiro', label: 'Preparação: Bainha BTraseiro', icon: 'fa-uncharted', color: '#ef4444' },
                { id: 'RTPrepVista', label: 'Preparação: Bainha Con. Vista', icon: 'fa-uncharted', color: '#ef4444' },
                { id: 'RTPrepEmenda', label: 'Preparação: Emenda Cós', icon: 'fa-uncharted', color: '#ef4444' },
                { id: 'RTPrepLateral', label: 'Preparação: Marc. Lateral', icon: 'fa-uncharted', color: '#ef4444' },
                { id: 'RTPrepSanduiche', label: 'Preparação: Sanduíche', icon: 'fa-uncharted', color: '#ef4444' },
                { id: 'RTTrasBainha', label: 'Traseira: Bainha B.Traseiro', icon: 'fa-solid fa-diagram-successor', color: '8b5cf6' },
                { id: 'RTTrasBolso', label: 'Traseira: Bolso Traseiro', icon: 'fa-solid fa-diagram-successor', color: '8b5cf6' },
                { id: 'RTTrasFechadeira', label: 'Traseira: Fechadeira', icon: 'fa-solid fa-diagram-successor', color: '8b5cf6' },
                { id: 'RTTrasOver', label: 'Traseira: Overloque', icon: 'fa-solid fa-diagram-successor', color: '8b5cf6' },
                { id: 'RTTrasForro', label: 'Traseira: Forro Boca', icon: 'fa-solid fa-diagram-successor', color: '8b5cf6' },
                { id: 'RTTrasLateral', label: 'Traseira: Marcação Lateral', icon: 'fa-solid fa-diagram-successor', color: '8b5cf6' },
                { id: 'RTTrasPala', label: 'Traseira: Pala', icon: 'fa-solid fa-diagram-successor', color: '8b5cf6' },
                { id: 'RRTTrasGancho', label: 'Traseira: Rebater Gancho', icon: 'fa-solid fa-diagram-successor', color: '8b5cf6' },
                { id: 'RTTrasRefila', label: 'Traseira: Refilado', icon: 'fa-solid fa-diagram-successor', color: '8b5cf6' },
             
            ];

            let currentOpIndex = 0;
            let charts = {};
            let rotationTimeout = null;
            let lastSuccessfulData = {};
            let retryCount = 0;
            const MAX_RETRIES = 2;

            function updateClock() {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString('pt-PT');
                document.getElementById('date').innerText = now.toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long' });
            }
            setInterval(updateClock, 1000);

            window.handleApiResponse = function (result) {
                const statusText = document.getElementById('status-text');
                const statusDot = document.getElementById('status-dot');
                const currentOp = OPERATIONS[currentOpIndex].id;

                if (result && (result.status === 'success' || result.data) && result.data) {

                    retryCount = 0;
                    lastSuccessfulData[currentOp] = result.data;

                    const total = result.data.total || 0;

                    // 🔍 verifica se existe alguma operação com valor > 0
                    const existeValida = Object.values(lastSuccessfulData)
                        .some(d => (d.total || 0) > 0);

                    // 🚫 se atual é zero E existe alguma válida → pula
                    if (total <= 0 && existeValida) {
                        currentOpIndex = (currentOpIndex + 1) % OPERATIONS.length;
                        fetchData();
                        return;
                    }

                    // ✅ se TODAS são zero → entra aqui normalmente
                    updateUI(OPERATIONS[currentOpIndex], result.data);

                    // 🟡 muda status visual (opcional, mas muito bom)
                    if (!existeValida) {
                        statusText.innerText = "Sem produção";
                        statusDot.className = "w-2 h-2 rounded-full bg-yellow-400 pulse-status";
                    } else {
                        statusText.innerText = "Ligado";
                        statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
                    }

                    startTimer();
                }
                else {
                    handleFetchError();
                }
            };
            function handleFetchError() {
                const statusText = document.getElementById('status-text');
                const statusDot = document.getElementById('status-dot');
                const currentOp = OPERATIONS[currentOpIndex].id;

                if (retryCount < MAX_RETRIES) {
                    retryCount++;
                    statusText.innerText = `A tentar novamente (${retryCount})...`;
                    statusDot.className = "w-2 h-2 rounded-full bg-orange-400 pulse-status";
                    setTimeout(fetchData, 3000);
                } else {
                    retryCount = 0;
                    statusText.innerText = "Erro de Ligação (Cache)";
                    statusDot.className = "w-2 h-2 rounded-full bg-rose-500";

                    if (lastSuccessfulData[currentOp]) {
                        updateUI(OPERATIONS[currentOpIndex], lastSuccessfulData[currentOp]);
                    } else {
                        useDemoMode(OPERATIONS[currentOpIndex]);
                    }
                    startTimer();
                }
            }

            function fetchData() {
                const currentOp = OPERATIONS[currentOpIndex];
                const old = document.getElementById('api-script');
                if (old) old.remove();

                const script = document.createElement('script');
                script.id = 'api-script';
                // Adicionado parâmetro cache-breaker 'v' para evitar respostas antigas do browser
                script.src = `${API_URL}?sheet=${currentOp.id}&callback=handleApiResponse&v=${Date.now()}`;

                script.onerror = () => handleFetchError();
                document.body.appendChild(script);
            }

            function startTimer() {
                if (rotationTimeout) clearTimeout(rotationTimeout);
                rotationTimeout = setTimeout(() => {
                    currentOpIndex = (currentOpIndex + 1) % OPERATIONS.length;
                    fetchData();
                }, 10000);
            }

            function updateUI(opInfo, data) {
                if (!data) return;

                document.getElementById('operation-title').innerText = opInfo.label;
                document.getElementById('current-op-footer').innerText = opInfo.label;
                const iconContainer = document.getElementById('op-visual-icon');
                iconContainer.innerHTML = `<i class="fas ${opInfo.icon || 'fa-industry'}"></i>`;
                iconContainer.style.background = `${opInfo.color}10`;
                iconContainer.style.color = opInfo.color;
                iconContainer.style.borderColor = `${opInfo.color}30`;

                document.getElementById('card-total-producao').innerText = data.total || 0;




                const percentCard = (v) => {
                    let val = parseFloat(v) || 0;

                    // normaliza tudo para %
                    if (val <= 1) {
                        val = val * 100;
                    } else if (val <= 10) {
                        // caso venha 3 (representando 300%)
                        val = val * 100;
                    }

                    val = Math.min(val, 100);

                    return Math.round(val);
                };

                const ritmoVal = percentCard(data.ritmo);
                const qualidadeVal = percentCard(data.qualidade);
                updateQualidadeStatus(qualidadeVal);


                document.getElementById('card-qualidade').innerText = qualidadeVal + '%';

                updateRitmoStatus(ritmoVal);

                const tl = data.timeline || {};
                const metaDia = parseInt(tl.metadia) || 0;
                const porcExecRaw = parseFloat(tl.porcexec) || 0;
                const porcExec = normalizePercent(tl.porcexec) / 100;
                const porcExecPercent = normalizePercent(tl.porcexec);
                const img = getVolumeImage(porcExecPercent);

                document.getElementById('volume-img').src =
                    `https://mldgp1977.github.io/KVL/${img}`;

                document.getElementById('meta-dia-val').innerText = `Meta: ${metaDia}`;
                document.getElementById('perc-conclusao').innerText =
                    Math.round(normalizePercent(tl.porcexec)) + '%';

                const dashOffset = 263.89 - (263.89 * Math.min(1, porcExec));
                document.getElementById('progress-circle').style.strokeDashoffset = dashOffset;
                document.getElementById('progress-line').style.width = (Math.min(1, porcExec) * 100) + '%';

                const percRet = parseFloat(tl.porc) || 0;


                updateCharts(data);

                document.getElementById('next-op').innerText = OPERATIONS[(currentOpIndex + 1) % OPERATIONS.length].label;
                document.getElementById('op-indicators').innerHTML = OPERATIONS.map((_, i) =>
                    `<div class="h-1.5 rounded-full transition-all duration-500 ${i === currentOpIndex ? 'w-4 bg-blue-600' : 'w-1 bg-slate-200'}"></div>`
                ).join('');
            }

            function initCharts() {

                    animation: { duration: 800 },
                    plugins: { legend: { display: false }, datalabels: { display: true, color: '#0f172a', font: { weight: 'bold', size: 13 }, anchor: 'end', align: 'top', formatter: (value) => value || '' } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 13, weight: '700' } } },
                        y: { beginAtZero: true, grace: '15%', grid: { display: false }, ticks: { color: '#f1f5f9' }, beginAtZero: true, ticks: { color: '#94a3b8', font: { size: 10 } } }
                    }
                };

                charts.main = new Chart(document.getElementById('chart-producao-meta'), {
                    data: {
                        labels: [],
                        datasets: [
                          //  { type: 'line', label: 'Meta', borderColor: '#dc2626', borderWidth: 3, borderDash: [6, 6], pointRadius: 0, datalabels: { display: function (context) { return context.dataIndex === context.dataset.data.length - 1; }, align: 'right', anchor: 'end', offset: 60, color: '#ffffff', borderRadius: 4, padding: 4, color: '#dc2626', font: { weight: 'bold', size: 13 } }, data: [] },
                            { type: 'bar', label: 'Produzido', backgroundColor: '#3b82f6', borderRadius: 4, data: [], maxBarThickness: 80, barPercentage: 0.9, categoryPercentage: 0.8, datalabels: { anchor: 'end', align: 'top' } }
                        ]
                    },
                    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { display: false },
         datalabels: {
                display: true,
                color: '#000000',
                font: { weight: 'bold', size: 14 }
            },   
            annotation: {
                annotations: {
                    linhaMeta: {
                        type: 'line',
                        yMin: 0,
                        yMax: 0,
                        borderColor: '#dc2626',
                        borderWidth: 3,
                        borderDash: [6, 6],
                        label: {
                            display: true,
                            content: 'Meta',
                            position: 'end',
                            xAdjust: 12, // Empurra o rótulo para fora da área das colunas
                            yAdjust: -10,    // Move um pouco para cima da linha para não colidir
                            backgroundColor: 'transparent',
                            color: '#dc2626',
                            font: { weight: 'bold', size: 13 }
                        }
                    }
                }
            }
        },
        scales: {
            x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 13, weight: '700' } } },
            y: { beginAtZero: true, grace: '15%', grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 12 } } }
        }
    }
                });



                charts.ops = new Chart(document.getElementById('chart-operador'), {
                    type: 'bar',
                    data: {
                        labels: [],
                        datasets: [
                            {
                                label: 'Performance',
                                data: [],
                                borderRadius: 6,
                                maxBarThickness: 80,
                                barPercentage: 0.9,
                                categoryPercentage: 0.8,
                                backgroundColor: [],
                                datalabels: {
                                    labels: {

                                        // 🔝 LABEL EXTERNO (PERCENTUAL)
                                        percent: {
                                            anchor: 'end',
                                            align: 'end',
                                            offset: 6,
                                            color: '#000',
                                            clamp: true,
                                            clip: false,
                                            formatter: (value) => Math.round(value) + '%',
                                            font: {
                                                weight: 'bold',
                                                size: 13
                                            }
                                        },

                                        // 📦 LABEL INTERNO (VOLUME PRODUZIDO)
                                        volume: {

                            y: {

                                beginAtZero: true,
                                grace: '25%',

function updateCharts(data) {
    const tl = data.timeline;
    if (!tl || !charts.main || !charts.ops) return;

    // --- GRÁFICO 1: PRODUÇÃO vs META ---
    const labels = tl.labels || [];
    const prod = tl.prod || [];
    const metaArray = tl.meta || [];

    const filtered = labels.map((label, i) => ({
        label,
        prod: prod[i],
        meta: metaArray[i]
    })).filter(item => item.label && item.label !== "");

    charts.main.data.labels = filtered.map(i => i.label);
    
    // CORREÇÃO: O dataset de barras agora é o [0]
    charts.main.data.datasets[0].data = filtered.map(i => i.prod);

    // Atualiza a Linha de Meta (Annotation)
    const valorMeta = filtered.length > 0 ? filtered[filtered.length - 1].meta : 0;
    
    if (charts.main.options.plugins.annotation) {
        const anno = charts.main.options.plugins.annotation.annotations.linhaMeta;
        anno.yMin = valorMeta;
        anno.yMax = valorMeta;
        anno.label.content = 'Meta: ' + valorMeta;
    }
    charts.main.update();


    // --- GRÁFICO 2: EFICIÊNCIA OPERADOR ---
    const nomes = (tl.costureira || [])
        .filter(n => n && n.trim() !== "")
        .map(nome => {
            const partes = nome.trim().split(' ');
            return partes.length === 1 ? partes[0] : `${partes[0]} ${partes[1].substring(0, 4)}`;
        });

    const perc = (tl.ating || []).slice(0, nomes.length).map(v => {
        return Number(normalizePercent(v).toFixed(1));
    });
    
    const volume = (tl.prodreal1 || []).slice(0, nomes.length);
    const cores = perc.map(v => v < 70 ? '#ef4444' : v < 90 ? '#facc15' : '#22c55e');

    charts.ops.data.labels = nomes;
    charts.ops.data.datasets[0].data = perc;
    charts.ops.data.datasets[0].backgroundColor = cores;
    charts.ops.data.datasets[0].volumeData = volume;

    charts.ops.update();
}

            function getVolumeImage(porc) {
                if (porc <= 0) return 'N0.png';
                if (porc <= 10) return 'N1.png';
                if (porc <= 20) return 'N2.png';
                if (porc <= 40) return 'N3.png';
                if (porc <= 60) return 'N4.png';
                if (porc <= 80) return 'N5.png';
                if (porc <= 100) return 'N6.png';
                return 'N7.png';
            }

            function updateRitmoStatus(valor) {
                const el = document.getElementById('ritmo-status');

                if (!el) return;

                if (valor >= 90) {
                    el.innerText = "🟢 Bem Cadenciado";
                    animateValue(el);
                    el.style.background = "#dcfce7";
                    el.style.color = "#166534";
                }
                else if (valor >= 80) {
                    el.innerText = "🟡 Ritmo Oscilante";
                    animateValue(el);
                    el.style.background = "#fef9c3";
                    el.style.color = "#854d0e";
                }
                else {
                    el.innerText = "🔴 Ritmo Baixo";
                    animateValue(el);
                    el.style.background = "#fee2e2";
                    el.style.color = "#991b1b";
                }
            }

            function updateQualidadeStatus(valor) {
                const el = document.getElementById('qualidade-status');

                if (!el) return;

                if (valor >= 90) {
                    el.innerText = "🟢 Ótimo";
                    el.style.background = "#dcfce7";
                    el.style.color = "#166534";
                }
                else if (valor >= 35) {
                    el.innerText = "🟡 Atenção";
                    el.style.background = "#fef9c3";
                    el.style.color = "#854d0e";
                }
                else {
                    el.innerText = "🔴 Crítico";
                    el.style.background = "#fee2e2";
                    el.style.color = "#991b1b";
                }

                animateValue(el);
            }

            function entrarFullscreen() {
                const el = document.documentElement;

                if (el.requestFullscreen) {
                    el.requestFullscreen();
                } else if (el.webkitRequestFullscreen) {
                    el.webkitRequestFullscreen();
                } else if (el.msRequestFullscreen) {
                    el.msRequestFullscreen();
                }
            }

            // dispara no primeiro clique
            document.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    const el = document.documentElement;
                    if (el.requestFullscreen) el.requestFullscreen();
                }
            },);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    }
                }
            });

            function sairFullscreen() {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                }
            }

            function animateValue(el) {
                el.classList.add('updated');
                setTimeout(() => el.classList.remove('updated'), 300);
            }

            function useDemoMode(opInfo) {
                updateUI(opInfo, {
                    total: "--", media: "--", boas: "--", consertos: "--", ritmo: 0, qualidade: 0,
                    timeline: {
                        labels: ['Sem Dados'], prod: [0], meta: [0], prodReal: 0, retrabalho: 0, porc: 0,
                        costureira: ['Aguardando'], prodreal1: [0], metadia: 0, porcexec: 0
                    }
                });
            }

            window.onload = () => {
                updateClock();
                initCharts();
                fetchData();
                let timeout;

                document.addEventListener('mousemove', () => {
                    const btn = document.getElementById('btn-exit');
                    if (!btn) return; // evita erro se ainda não carregou

                    btn.style.opacity = '1';

                    clearTimeout(timeout);
                    timeout = setTimeout(() => {
                        btn.style.opacity = '0';
                    }, 2000);
                });


            };
        </script>
